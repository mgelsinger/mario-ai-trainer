<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario AI Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/recharts@2.5.0/umd/Recharts.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #07080a;
  --bg-secondary: #0d1117;
  --bg-card: #161b22;
  --bg-input: #1c2333;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-dim: #6e7681;
  --green: #39d353;
  --green-dim: #1a7f37;
  --blue: #58a6ff;
  --blue-dim: #1f6feb;
  --gold: #e3b341;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --neon-green: #00ff41;
  --neon-blue: #00d4ff;
}

body {
  font-family: 'Courier New', monospace;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* Top Bar */
.top-bar {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
}
.top-bar h1 {
  font-family: 'Press Start 2P', cursive;
  font-size: 14px;
  color: var(--neon-green);
  text-shadow: 0 0 10px rgba(0,255,65,0.5);
  white-space: nowrap;
}
.badges { display: flex; gap: 8px; margin-left: auto; }
.badge {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-green { background: rgba(57,211,83,0.15); color: var(--green); border: 1px solid var(--green-dim); }
.badge-red { background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid #da3633; }
.badge-blue { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid var(--blue-dim); }
.badge-gold { background: rgba(227,179,65,0.15); color: var(--gold); border: 1px solid #9e6a03; }
.badge-gray { background: rgba(139,148,158,0.15); color: var(--text-secondary); border: 1px solid var(--border); }

/* Layout */
.main-layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 340px;
  min-width: 340px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Content */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* Panels */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.panel-header {
  padding: 10px 14px;
  font-family: 'Press Start 2P', cursive;
  font-size: 9px;
  color: var(--neon-blue);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.panel-header:hover { background: rgba(255,255,255,0.02); }
.panel-body { padding: 12px 14px; }
.panel-body.collapsed { display: none; }

/* System Health */
.health-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
}
.health-label { color: var(--text-secondary); }
.health-value { font-weight: bold; }
.health-pass { color: var(--green); }
.health-fail { color: var(--red); }
.health-warn { color: var(--gold); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-start { background: var(--green-dim); color: white; }
.btn-start:hover:not(:disabled) { background: var(--green); color: black; }
.btn-stop { background: #da3633; color: white; }
.btn-stop:hover:not(:disabled) { background: var(--red); }
.btn-resume { background: var(--blue-dim); color: white; }
.btn-resume:hover:not(:disabled) { background: var(--blue); }

/* Training Progress Bar */
.progress-wrap {
  margin-top: 4px;
}
.progress-bar-outer {
  width: 100%;
  height: 8px;
  background: var(--bg-input);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--green-dim), var(--green));
  border-radius: 4px;
  transition: width 0.3s ease;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 3px;
}
.btn-small {
  padding: 6px 12px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  width: auto;
}

/* Param Controls */
.param-group { margin-bottom: 10px; }
.param-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  margin-bottom: 4px;
}
.param-name { color: var(--text-primary); font-weight: bold; }
.param-value { color: var(--neon-green); font-family: 'Courier New', monospace; }
.param-desc {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 6px;
  line-height: 1.4;
}
input[type="range"] {
  width: 100%;
  height: 4px;
  -webkit-appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--neon-green);
  cursor: pointer;
}
input[type="range"]:disabled::-webkit-slider-thumb { background: var(--text-dim); }
select {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}
select:disabled { opacity: 0.5; }

/* Stats Cards */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  text-align: center;
}
.stat-label {
  font-size: 10px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.stat-value {
  font-family: 'Press Start 2P', cursive;
  font-size: 16px;
}
.stat-green { color: var(--neon-green); text-shadow: 0 0 8px rgba(0,255,65,0.4); }
.stat-blue { color: var(--neon-blue); text-shadow: 0 0 8px rgba(0,212,255,0.4); }
.stat-gold { color: var(--gold); text-shadow: 0 0 8px rgba(227,179,65,0.4); }
.stat-red { color: var(--red); }
.stat-purple { color: var(--purple); text-shadow: 0 0 8px rgba(188,140,255,0.4); }
.stat-subtitle { font-size: 9px; color: var(--text-dim); margin-top: 4px; line-height: 1.3; }

/* Charts Grid */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.chart-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 9px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

/* Replay Viewer */
.replay-viewer {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
}
.replay-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 11px;
  color: var(--neon-blue);
  margin-bottom: 12px;
}
.replay-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.replay-chip {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  transition: all 0.15s;
}
.replay-chip:hover { border-color: var(--blue); color: var(--blue); }
.replay-chip.active { background: var(--blue-dim); border-color: var(--blue); color: white; }
.replay-canvas-wrap {
  display: flex;
  justify-content: center;
  background: #000;
  border-radius: 4px;
  margin-bottom: 12px;
  min-height: 240px;
  align-items: center;
}
.replay-canvas-wrap canvas, .replay-canvas-wrap img {
  image-rendering: pixelated;
  max-width: 100%;
  height: 480px;
}
.replay-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}
.replay-controls input[type="range"] { flex: 1; }
.replay-speed {
  display: flex;
  gap: 4px;
}
.speed-btn {
  padding: 3px 8px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
}
.speed-btn.active { background: var(--blue-dim); border-color: var(--blue); color: white; }

/* Best replay chip */
.replay-chip.best { border-color: var(--gold); color: var(--gold); background: rgba(227,179,65,0.1); }
.replay-chip.best.active { background: rgba(227,179,65,0.25); }

/* Checkpoints Panel */
.checkpoints-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
}
.checkpoints-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 11px;
  color: var(--neon-blue);
  margin-bottom: 12px;
}
.checkpoint-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 6px;
  font-size: 11px;
  background: var(--bg-input);
}
.checkpoint-row.is-best { border-color: var(--gold); background: rgba(227,179,65,0.05); }
.checkpoint-name { color: var(--text-primary); font-weight: bold; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.checkpoint-meta { color: var(--text-secondary); font-size: 10px; }
.checkpoint-actions { display: flex; gap: 6px; }
.snapshot-row { display: flex; gap: 8px; margin-bottom: 12px; }
.snapshot-input {
  flex: 1;
  padding: 6px 10px;
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}

/* Log Console */
.log-console {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.log-console-header {
  font-family: 'Press Start 2P', cursive;
  font-size: 9px;
  color: var(--text-secondary);
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.log-content {
  height: 200px;
  overflow-y: auto;
  padding: 10px 14px;
  font-size: 11px;
  line-height: 1.6;
  color: var(--text-dim);
}
.log-content div { white-space: pre-wrap; word-break: break-all; }

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--text-dim);
  text-align: center;
}
.empty-state h2 {
  font-family: 'Press Start 2P', cursive;
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.empty-state p { font-size: 13px; max-width: 400px; line-height: 1.6; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Warning box */
.warning-box {
  background: rgba(210,153,34,0.1);
  border: 1px solid var(--orange);
  border-radius: 6px;
  padding: 10px;
  font-size: 11px;
  color: var(--gold);
  margin-top: 8px;
  line-height: 1.5;
}

/* Live Play Panel */
.live-play-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
}
.live-play-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 11px;
  color: var(--neon-green);
  margin-bottom: 12px;
}
.live-play-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.live-play-controls select {
  width: auto;
  min-width: 120px;
  flex: 1;
}
.live-play-controls .btn { width: auto; min-width: 100px; flex: 0; }
.live-play-field { display: flex; flex-direction: column; gap: 2px; }
.live-play-field label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.live-play-canvas-wrap {
  display: flex;
  justify-content: center;
  background: #000;
  border-radius: 4px;
  margin-bottom: 12px;
  min-height: 240px;
  align-items: center;
  position: relative;
}
.live-play-canvas-wrap canvas {
  image-rendering: pixelated;
  max-width: 100%;
  height: 480px;
}
.live-stats {
  display: flex;
  gap: 16px;
  justify-content: center;
  padding: 8px 0;
}
.live-stat { text-align: center; }
.live-stat-label { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.live-stat-value { font-family: 'Press Start 2P', cursive; font-size: 12px; color: var(--neon-green); }
.play-result {
  text-align: center;
  padding: 12px;
  border-radius: 6px;
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
  margin-bottom: 12px;
}
.play-result.win {
  background: rgba(57,211,83,0.15);
  border: 1px solid var(--green-dim);
  color: var(--green);
}
.play-result.lose {
  background: rgba(248,81,73,0.15);
  border: 1px solid #da3633;
  color: var(--red);
}
.play-result .result-stats {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  margin-top: 6px;
  color: var(--text-secondary);
}

/* Level Progression */
.level-grid-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
}
.level-grid-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 11px;
  color: var(--neon-blue);
  margin-bottom: 12px;
}
.level-grid {
  display: grid;
  grid-template-columns: auto repeat(4, 1fr);
  gap: 4px;
}
.level-grid-header {
  font-size: 9px;
  color: var(--text-secondary);
  text-align: center;
  padding: 4px;
  font-family: 'Press Start 2P', cursive;
}
.level-cell {
  padding: 6px 8px;
  border-radius: 4px;
  font-size: 10px;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-dim);
  transition: all 0.15s;
}
.level-cell:hover { border-color: var(--blue); }
.level-cell.trained { background: rgba(88,166,255,0.1); border-color: var(--blue-dim); color: var(--blue); }
.level-cell.completed { background: rgba(57,211,83,0.1); border-color: var(--green-dim); color: var(--green); }
.level-cell.current { border-color: var(--gold); box-shadow: 0 0 6px rgba(227,179,65,0.3); }
.level-cell-info { font-size: 8px; color: var(--text-dim); margin-top: 2px; }

/* Level badge on checkpoints */
.level-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 9px;
  font-weight: bold;
  background: rgba(88,166,255,0.15);
  color: var(--blue);
  border: 1px solid var(--blue-dim);
  margin-left: 6px;
}

/* Next level banner */
.next-level-banner {
  background: rgba(57,211,83,0.1);
  border: 1px solid var(--green-dim);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 20px;
  text-align: center;
}
.next-level-banner .banner-text {
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  color: var(--green);
  margin-bottom: 8px;
}
.next-level-banner .btn { width: auto; display: inline-flex; }

@media (max-width: 1200px) {
  .charts-grid { grid-template-columns: 1fr; }
}
@media (max-width: 900px) {
  .main-layout { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; max-height: 50vh; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;
var useCallback = React.useCallback;

// Recharts components
var AreaChart = Recharts.AreaChart;
var Area = Recharts.Area;
var LineChart = Recharts.LineChart;
var Line = Recharts.Line;
var ScatterChart = Recharts.ScatterChart;
var Scatter = Recharts.Scatter;
var XAxis = Recharts.XAxis;
var YAxis = Recharts.YAxis;
var CartesianGrid = Recharts.CartesianGrid;
var Tooltip = Recharts.Tooltip;
var ResponsiveContainer = Recharts.ResponsiveContainer;
var ComposedChart = Recharts.ComposedChart;
var ReferenceLine = Recharts.ReferenceLine;

// --- HYPERPARAMETER DEFINITIONS ---
var PARAM_SECTIONS = [
  {
    title: "NEURAL NETWORK",
    params: [
      { key: "learning_rate", name: "Learning Rate", min: 0.00001, max: 0.01, step: 0.00001, default: 0.0001,
        format: function(v) { return v.toExponential(1); },
        desc: "How big of a step the AI takes when updating its brain. Too high = chaotic learning, too low = painfully slow progress." },
      { key: "lr_annealing", name: "LR Schedule", type: "select",
        options: [
          { value: "linear", label: "Linear Annealing (Recommended)" },
          { value: "constant", label: "Constant" },
        ],
        default: "linear",
        desc: "Linear annealing gradually reduces the learning rate to zero, preventing wild updates late in training and improving stability." },
      { key: "batch_size", name: "Batch Size", min: 16, max: 512, step: 16, default: 64,
        desc: "How many experiences the AI looks at simultaneously during each learning step. Bigger = more stable, but needs more GPU memory." },
      { key: "n_epochs", name: "Epochs Per Update", min: 1, max: 30, step: 1, default: 10,
        desc: "How many times the AI re-studies the same batch of experiences. 10 is proven to work well for Mario. Going much higher risks overfitting per rollout." },
      { key: "n_steps", name: "Steps Per Update", min: 64, max: 4096, step: 64, default: 512,
        desc: "How many game steps the AI plays before stopping to learn from the experience. More steps = more stable but slower updates." },
    ]
  },
  {
    title: "PPO ALGORITHM",
    params: [
      { key: "gamma", name: "Discount Factor", min: 0.8, max: 0.999, step: 0.001, default: 0.9,
        desc: "How much the AI values future rewards vs immediate ones. 0.9 works best for Mario \u2014 it's a reactive game where you need to respond to what's right in front of you." },
      { key: "gae_lambda", name: "GAE Lambda", min: 0.8, max: 1.0, step: 0.01, default: 0.95,
        desc: "Balances bias vs variance in advantage estimation. Think of it as how far ahead the AI looks when deciding if an action was good." },
      { key: "clip_range", name: "PPO Clip Range", min: 0.05, max: 0.5, step: 0.01, default: 0.2,
        desc: "Limits how much the AI can change its behavior in a single update. This is PPO's key trick \u2014 prevents catastrophic unlearning." },
      { key: "ent_coef", name: "Entropy Bonus", min: 0.0, max: 0.1, step: 0.001, default: 0.01,
        desc: "Rewards the AI for trying new things. 0.01 is the proven sweet spot for Mario. Too high = erratic behavior, too low = gets stuck in ruts." },
      { key: "vf_coef", name: "Value Function Weight", min: 0.1, max: 1.0, step: 0.05, default: 0.5,
        desc: "How much the AI focuses on predicting future rewards vs picking good actions. Usually fine at 0.5." },
      { key: "max_grad_norm", name: "Gradient Clipping", min: 0.1, max: 2.0, step: 0.1, default: 0.5,
        desc: "Caps the size of learning updates to prevent the AI from making wild swings. Like a speed limit for learning." },
    ]
  },
  {

function formatTime(seconds) {
  if (!seconds || seconds < 0) return "0:00";
  var h = Math.floor(seconds / 3600);
  var m = Math.floor((seconds % 3600) / 60);
  var s = Math.floor(seconds % 60);
  if (h > 0) return h + ":" + (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  return m + ":" + (s < 10 ? "0" : "") + s;
}

        onResume: onResume,
        lastCheckpoint: lastCheckpoint,
        currentTimestep: metrics.length > 0 ? metrics[metrics.length - 1].timestep : 0,
        totalTimesteps: metrics.length > 0 ? metrics[metrics.length - 1].total_timesteps : 0,
      }),
      e(MainContent, {
        isTraining: isTraining,
        metrics: metrics,
        evalMetrics: evalMetrics,
        logs: logs,
        replays: replays,
        checkpoints: checkpoints,
        levels: levels,
        params: params,
        ws: wsRef.current,
        setReplayHandler: setReplayHandler,
        setPlayHandler: setPlayHandler,
        onRefreshCheckpoints: refreshCheckpoints,
        onTrainingStarted: function(dev) {
          setIsTraining(true);
          setDevice(dev || device);
          metricsRef.current = [];
          setMetrics([]);
          setEvalMetrics(null);
        },
        onSelectLevel: function(w, s) {
          onParamChange("world", w);
          onParamChange("stage", s);
        },
        onNextLevel: function(w, s) {
          // Stop current training, set level, suggest loading best checkpoint
          onStop();
          setTimeout(function() {
            onParamChange("world", w);
            onParamChange("stage", s);
          }, 500);
        },
      })
    )
  );
}

// Mount
var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
</script>
</body>
</html>
